name: samri-env
channels:
  - pytorch
  - conda-forge
  - defaults
dependencies:
  # Core runtime
  - python=3.11
  - pip

  # Scientific stack
  - numpy=1.26.4
  - scipy=1.13.0
  - scikit-image=0.25.0
  - scikit-learn=1.5.1
  - pandas=2.2.0
  - matplotlib
  - h5py
  - tqdm
  - opencv=4.10.*

  # Medical image I/O
  - nibabel=5.3.2
  - simpleitk>=2.2.1

  # PyTorch for macOS (MPS when available, CPU fallback)
  - pytorch>=2.2
  - torchvision

  # Napari desktop workflow
  - napari
  - pyqt
  - magicgui
  - npe2
  - imagecodecs
  - tifffile

  # Optional notebook tooling used by SAMRI notebooks/GUI
  - jupyterlab=4.5.0
  - notebook=7.5.0
  - ipywidgets=8.1.8
  - ipympl

  - pip:
      # SAMRI package (run conda env create from repo root)
      - -e ./SAMRI

      # SAM/SAMRI dependency gaps often resolved via pip
      - segment-anything
      - ipycanvas==0.14.2
      - ipyfilechooser==0.6.0
