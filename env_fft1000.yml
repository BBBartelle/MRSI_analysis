name: mrsi-cpca-fft1000
channels:
  - conda-forge
  - defaults
dependencies:
  - python=3.10
  - numpy>=1.23
  - scipy>=1.9
  - pandas>=1.5
  - matplotlib>=3.6
  - scikit-learn>=1.2
  - nibabel>=5.0
  - pydicom>=2.4
  - ipywidgets>=8.0
  - jupyterlab>=4.0
  - notebook>=7.0
  - ipykernel
  - pip
  - pip:
      - nmrglue[version='>=0.10']
      - nmrpy
      - -e ./contrastive
